name: ShopFlow CI/CD Pipeline

on:
  push:
    branches: [dev, staging, main]
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  code-scan:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: code-scan
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & Push Frontend
        if: contains(github.event.commits[0].modified, 'frontend/')
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/shopflow-frontend:${{ github.sha }} ./frontend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/shopflow-frontend:${{ github.sha }}

      - name: Build & Push Backend
        if: contains(github.event.commits[0].modified, 'backend/')
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/shopflow-backend:${{ github.sha }} ./backend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/shopflow-backend:${{ github.sha }}

      - name: Trivy Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/shopflow-frontend:${{ github.sha }}
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Trivy Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/shopflow-backend:${{ github.sha }}
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Get AKS Credentials
        run: az aks get-credentials --resource-group ${{ secrets.RESOURCE_GROUP }} --name ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Update Dev Image Tag
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" helm/shopflow/values.yaml
          git config user.email "ci@shopflow.com"
          git config user.name "CI Bot"
          git add helm/shopflow/values.yaml
          git commit -m "ci: update dev image tag to ${{ github.sha }}"
          git push

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Get AKS Credentials
        run: az aks get-credentials --resource-group ${{ secrets.RESOURCE_GROUP }} --name ${{ secrets.AKS_CLUSTER_NAME }}

      - name: OWASP ZAP Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://staging.shopflow.com'
          allow_issue_writing: false

      - name: Update Staging Image Tag
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" helm/shopflow/values.yaml
          git config user.email "ci@shopflow.com"
          git config user.name "CI Bot"
          git add helm/shopflow/values.yaml
          git commit -m "ci: update staging image tag to ${{ github.sha }}"
          git push

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Get AKS Credentials
        run: az aks get-credentials --resource-group ${{ secrets.RESOURCE_GROUP }} --name ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Update Prod Image Tag
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" helm/shopflow/values.yaml
          git config user.email "ci@shopflow.com"
          git config user.name "CI Bot"
          git add helm/shopflow/values.yaml
          git commit -m "ci: update prod image tag to ${{ github.sha }}"
          git push
