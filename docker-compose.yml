version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: shopflow-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: shopflow
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: shopflow-backend
    restart: always
    environment:
      PORT: 5000
      MONGO_URI: mongodb://root:password@mongodb:27017/shopflow?authSource=admin
    ports:
      - "5000:5000"
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: shopflow-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongodb_data:
